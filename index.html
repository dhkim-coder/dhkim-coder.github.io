<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>클리어 보장 사과 게임 (Apple Game)</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f7f9fa;
            user-select: none;
            margin: 20px;
        }

        h1 {
            color: #d32f2f;
            margin-bottom: 10px;
        }

        .info {
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* 게임 보드 판 (10x10 격자) */
        #game-board {
            position: relative;
            display: grid;
            grid-template-columns: repeat(10, 50px);
            grid-template-rows: repeat(10, 50px);
            gap: 8px;
            background-color: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: crosshair;
        }

        /* 사과 스타일 */
        .apple {
            position: relative;
            width: 50px;
            height: 50px;
            background-color: #ff4d4d;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: inset -3px -3px 5px rgba(0,0,0,0.2), 1px 2px 4px rgba(0,0,0,0.1);
            transition: opacity 0.3s ease, transform 0.2s;
        }

        /* 사과 꼭지 */
        .apple::before {
            content: '';
            position: absolute;
            top: -4px;
            width: 4px;
            height: 6px;
            background-color: #8b5a2b;
            border-radius: 2px;
        }

        /* 지워진 사과 스타일 */
        .apple.removed {
            opacity: 0;
            pointer-events: none; 
            transform: scale(0.8);
        }

        /* 드래그 선택 영역 상자 */
        #drag-selection {
            position: absolute;
            border: 2px dashed #2196F3;
            background-color: rgba(33, 150, 243, 0.2);
            pointer-events: none; 
            display: none;
            z-index: 10;
        }

        /* 현재 선택 중인 사과 하이라이트 */
        .apple.selected {
            box-shadow: 0 0 0 3px #2196F3, inset -3px -3px 5px rgba(0,0,0,0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>사과 게임 (클리어 보장 버전)</h1>
    <div class="info">모든 사과의 합이 10의 배수로 이루어져 있어 완벽히 클리어가 가능합니다!</div>

    <div id="game-board">
        <div id="drag-selection"></div>
    </div>

    <script>
        const board = document.getElementById('game-board');
        const dragSelection = document.getElementById('drag-selection');
        
        let isDragging = false;
        let startX = 0, startY = 0;
        let apples = [];

        // 1. 모든 사과를 지울 수 있는 100개의 숫자 생성 알고리즘
        function generateSolvableNumbers() {
            let numbers = [];
            
            // 총 100개의 칸을 채울 때까지 반복
            while (numbers.length < 100) {
                let remainingSpaces = 100 - numbers.length;
                
                // 하나의 그룹 크기를 2개~4개 사이로 무작위 결정 (남은 공간 고려)
                let groupSize = Math.floor(Math.random() * 3) + 2; 
                if (groupSize > remainingSpaces) groupSize = remainingSpaces;
                
                if (groupSize === 1) {
                    // 마지막에 1칸이 남는 예외 처리: 앞선 값과 조율하기보다 단순 보정용으로 10 생성 방지 위해 9 배치 등 처리
                    // 안전하게 그룹 크기가 최소 2가 되도록 설계했으므로 100개 채울 땐 깔끔하게 맞아떨어집니다.
                    numbers.push(10); // 실제 게임에선 10 단독은 규격 외이므로 하단에서 쪼갭니다.
                    break;
                }

                // groupSize개의 숫자로 합이 10이 되도록 쪼개기
                let targetSum = 10;
                let groupValues = [];
                
                for (let i = 0; i < groupSize - 1; i++) {
                    // 남은 합과 남은 개수를 고려하여 1~9 사이 숫자 할당
                    let maxPossible = targetSum - (groupSize - 1 - i);
                    let minPossible = 1;
                    let val = Math.floor(Math.random() * (Math.min(9, maxPossible) - minPossible + 1)) + minPossible;
                    
                    groupValues.push(val);
                    targetSum -= val;
                }
                // 마지막 숫자는 남은 잔여 합 전체 할당
                groupValues.push(targetSum);
                
                // 만약 0이 포함되거나 9를 초과하는 비정상 숫자가 나오면 재시도
                if (groupValues.some(v => v <= 0 || v > 9)) {
                    continue;
                }

                numbers.push(...groupValues);
            }

            // 배열 무작위로 섞기 (피셔-예이츠 셔플)
            for (let i = numbers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
            }

            return numbers;
        }

        // 2. 10x10 사과 보드 초기화
        function initGame() {
            const solvableNumbers = generateSolvableNumbers();

            for (let i = 0; i < 100; i++) {
                const apple = document.createElement('div');
                apple.classList.add('apple');
                
                // 생성된 클리어 보장 숫자 부여
                const num = solvableNumbers[i];
                apple.textContent = num;
                apple.dataset.value = num;
                apple.dataset.index = i;

                board.appendChild(apple);
                apples.push(apple);
            }
        }

        // 3. 마우스 드래그 시작
        board.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; 

            isDragging = true;
            const rect = board.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;

            dragSelection.style.left = `${startX}px`;
            dragSelection.style.top = `${startY}px`;
            dragSelection.style.width = '0px';
            dragSelection.style.height = '0px';
            dragSelection.style.display = 'block';

            e.preventDefault();
        });

        // 4. 마우스 드래그 중
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;

            const rect = board.getBoundingClientRect();
            const currentX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
            const currentY = Math.max(0, Math.min(e.clientY - rect.top, rect.height));

            const left = Math.min(startX, currentX);
            const top = Math.min(startY, currentY);
            const width = Math.abs(startX - currentX);
            const height = Math.abs(startY - currentY);

            dragSelection.style.left = `${left}px`;
            dragSelection.style.top = `${top}px`;
            dragSelection.style.width = `${width}px`;
            dragSelection.style.height = `${height}px`;

            checkSelection(left, top, width, height);
        });

        // 5. 드래그 영역 내 사과 체크
        function checkSelection(boxLeft, boxTop, boxWidth, boxHeight) {
            const boxRight = boxLeft + boxWidth;
            const boxBottom = boxTop + boxHeight;

            apples.forEach(apple => {
                if (apple.classList.contains('removed')) return;

                const appleLeft = apple.offsetLeft;
                const appleTop = apple.offsetTop;
                const appleRight = appleLeft + apple.offsetWidth;
                const appleBottom = appleTop + apple.offsetHeight;

                const isOverlapping = !(boxRight < appleLeft || 
                                        boxLeft > appleRight || 
                                        boxBottom < appleTop || 
                                        boxTop > appleBottom);

                if (isOverlapping) {
                    apple.classList.add('selected');
                } else {
                    apple.classList.remove('selected');
                }
            });
        }

        // 6. 마우스 드래그 종료 (합계 계산 및 제거)
        window.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            dragSelection.style.display = 'none';

            const selectedApples = apples.filter(apple => apple.classList.contains('selected'));
            
            let sum = 0;
            selectedApples.forEach(apple => {
                sum += parseInt(apple.dataset.value);
            });

            if (sum === 10) {
                selectedApples.forEach(apple => {
                    apple.classList.add('removed');
                    apple.classList.remove('selected');
                });
                checkWinCondition(); // 승리 조건 체크 추가
            } else {
                selectedApples.forEach(apple => {
                    apple.classList.remove('selected');
                });
            }
        });

        // 7. 게임 승리(전체 클리어) 확인
        function checkWinCondition() {
            const remainingApples = apples.filter(apple => !apple.classList.contains('removed'));
            if (remainingApples.length === 0) {
                setTimeout(() => {
                    alert('축하합니다! 모든 사과를 전부 지우셨습니다! 🎉');
                }, 300);
            }
        }

        // 게임 시작
        initGame();
    </script>
</body>
</html>
